name: "Grype Scan"

on:
  workflow_call:

jobs:
  run:
    name: grype
    if: github.repository == 'ethlimo/ens-hooks'
    permissions:
      packages: write
      contents: read
    runs-on: "ubuntu-latest"
    steps:
        # step-security/harden-runner@v2.13.2
      - uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            grype.anchore.io:443
            get.anchore.io:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
        # actions/checkout@v5
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        # anchore/scan-action@v6.5.1
      - uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e
        with:
          path: "."
          fail-build: true
          severity-cutoff: high

